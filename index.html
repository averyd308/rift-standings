<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift Standings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080e1c;
            color: #c8a96e;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #stars-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 980px;
            margin: 0 auto;
            padding: 30px 20px 80px;
        }

        /* ── Header ─────────────────────────────── */
        .header { text-align: center; margin-bottom: 36px; }
        .header h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: #c8a96e;
            text-shadow: 0 0 18px rgba(200,169,110,0.9), 0 0 60px rgba(200,169,110,0.3);
            letter-spacing: 5px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .header p {
            color: #4a4030;
            margin-top: 8px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.72rem;
        }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #c8a96e 20%, #c8a96e 80%, transparent);
            margin: 18px 0 0;
            opacity: 0.5;
        }

        /* ── Cards ──────────────────────────────── */
        .card {
            background: rgba(8,16,32,0.88);
            border: 1px solid #1a2840;
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(14px);
            box-shadow: 0 6px 30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(200,169,110,0.07);
        }
        .card-title {
            font-size: 0.68rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #5a5040;
            margin-bottom: 16px;
        }

        /* ── Form ───────────────────────────────── */
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch; }

        input[type="text"] {
            background: rgba(0,0,0,0.5);
            border: 1px solid #1a2840;
            color: #c8a96e;
            padding: 10px 14px;
            border-radius: 3px;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            flex: 1;
            min-width: 140px;
        }
        input[type="text"]::placeholder { color: #2a3a5a; }
        input[type="text"]:focus {
            border-color: #c8a96e;
            box-shadow: 0 0 0 2px rgba(200,169,110,0.1);
        }

        /* ── Champion Picker ────────────────────── */
        .champ-picker {
            position: relative;
            flex-shrink: 0;
        }

        .picker-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #1a2840;
            color: #c8a96e;
            padding: 6px 12px 6px 6px;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color 0.2s;
            height: 100%;
            min-height: 42px;
            user-select: none;
        }
        .picker-btn:hover, .picker-btn.open { border-color: #c8a96e; }

        .picker-thumb {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #c8a96e;
            object-fit: cover;
            background: #0a1428;
            flex-shrink: 0;
        }
        .picker-thumb.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #3a4a6a;
        }

        .picker-label {
            font-size: 0.85rem;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .picker-arrow { font-size: 0.6rem; color: #5a6a8a; margin-left: 2px; }

        .picker-dropdown {
            display: none;
            position: fixed;
            background: #0c1828;
            border: 1px solid #c8a96e;
            border-radius: 4px;
            z-index: 9999;
            width: 340px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .picker-dropdown.open { display: block; }

        .picker-search {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: none;
            border-bottom: 1px solid #1a2840;
            color: #c8a96e;
            padding: 10px 14px;
            font-size: 0.88rem;
            outline: none;
            border-radius: 4px 4px 0 0;
        }
        .picker-search::placeholder { color: #3a4a6a; }

        .picker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
            gap: 4px;
            padding: 10px;
            max-height: 280px;
            overflow-y: auto;
        }

        .picker-grid::-webkit-scrollbar { width: 6px; }
        .picker-grid::-webkit-scrollbar-track { background: transparent; }
        .picker-grid::-webkit-scrollbar-thumb { background: #2a3a5a; border-radius: 3px; }

        .champ-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 5px 3px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.12s;
        }
        .champ-option:hover { background: rgba(200,169,110,0.1); }
        .champ-option.selected { background: rgba(200,169,110,0.18); outline: 1px solid #c8a96e; }

        .champ-option img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #1a2840;
            object-fit: cover;
            transition: border-color 0.12s;
        }
        .champ-option:hover img, .champ-option.selected img { border-color: #c8a96e; }

        .champ-option span {
            font-size: 0.55rem;
            color: #7a8aaa;
            text-align: center;
            line-height: 1.2;
            max-width: 52px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .champ-option.selected span { color: #c8a96e; }

        .no-champ-opt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 5px 3px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.12s;
        }
        .no-champ-opt:hover { background: rgba(200,169,110,0.1); }
        .no-champ-opt.selected { background: rgba(200,169,110,0.18); outline: 1px solid #c8a96e; }
        .no-champ-opt .no-icon {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 2px dashed #2a3a5a;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            color: #3a4a6a;
        }
        .no-champ-opt span { font-size: 0.55rem; color: #5a6a8a; }

        /* ── Buttons ─────────────────────────────── */
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.18s;
            white-space: nowrap;
        }
        .btn-gold {
            background: linear-gradient(135deg, #c8a96e, #8a6030);
            color: #060d1a;
        }
        .btn-gold:hover {
            background: linear-gradient(135deg, #e0c484, #c8a96e);
            box-shadow: 0 0 18px rgba(200,169,110,0.45);
            transform: translateY(-1px);
        }
        .btn-sm { padding: 6px 14px; font-size: 0.7rem; }

        /* ── Table ───────────────────────────────── */
        table { width: 100%; border-collapse: collapse; }

        thead th {
            text-align: left;
            padding: 10px 14px;
            font-size: 0.62rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #3a4a6a;
            border-bottom: 1px solid #1a2840;
        }
        thead th.center { text-align: center; }

        tbody tr {
            border-bottom: 1px solid rgba(26,40,64,0.5);
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(200,169,110,0.04); }

        td { padding: 11px 14px; vertical-align: middle; }
        td.center { text-align: center; }

        /* Champion portrait in table */
        .avatar-wrap {
            flex-shrink: 0;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, #c8a96e, #5a3a10, #c8a96e);
        }
        .avatar-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .name-cell { display: flex; align-items: center; gap: 12px; }
        .player-name { font-weight: 700; color: #dfc080; font-size: 0.95rem; }
        .champ-sub { font-size: 0.68rem; color: #4a5a7a; margin-top: 2px; }

        .wins   { color: #50e070; font-weight: 700; }
        .losses { color: #e05050; font-weight: 700; }

        .wr-val { font-weight: 700; font-size: 0.88rem; }
        .wr-bar {
            width: 60px; height: 3px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            margin: 5px auto 0;
            overflow: hidden;
        }
        .wr-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

        .qbtn {
            display: inline-flex;
            align-items: center; justify-content: center;
            width: 30px; height: 30px;
            border: none; border-radius: 3px;
            cursor: pointer; font-weight: 800; font-size: 0.75rem;
            transition: all 0.15s;
        }
        .qbtn.w { background: rgba(38,95,52,0.55); color: #50e070; border: 1px solid rgba(38,95,52,0.9); }
        .qbtn.w:hover { background: rgba(38,95,52,0.95); transform: scale(1.12); }
        .qbtn.l { background: rgba(95,28,28,0.55); color: #e05050; border: 1px solid rgba(95,28,28,0.9); }
        .qbtn.l:hover { background: rgba(95,28,28,0.95); transform: scale(1.12); }

        .del-btn {
            background: rgba(120,20,20,0.4);
            border: 1px solid #6a1a1a;
            color: #e05050;
            font-size: 0.72rem;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 700;
        }
        .del-btn:hover { background: rgba(180,30,30,0.6); color: #ff7070; border-color: #aa3030; box-shadow: 0 0 8px rgba(220,50,50,0.3); }

        .row-actions { display: flex; gap: 6px; align-items: center; justify-content: center; }

        .rank-col { width: 44px; font-size: 1.1rem; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #2a3a5a;
            font-size: 0.82rem;
            letter-spacing: 2px;
        }

        /* Stat columns */
        .kda-val  { font-weight: 700; font-size: 0.88rem; }
        .dmg-val  { font-size: 0.85rem; color: #c8a96e; }
        .stat-sub { font-size: 0.62rem; color: #3a4a6a; margin-top: 2px; }

        /* Wider modal for extra fields */
        .modal { max-width: 480px !important; }
        .modal-fields-3 {
            display: flex; gap: 10px; margin-bottom: 14px;
        }
        .modal-fields-3 .field input { font-size: 0.95rem; }
        .field-full { margin-bottom: 14px; }
        .field-full label {
            display: block; font-size: 0.62rem; letter-spacing: 3px;
            text-transform: uppercase; color: #3a4a6a; margin-bottom: 7px;
        }
        .field-full input {
            width: 100%;
            background: rgba(0,0,0,0.5); border: 1px solid #1a2840;
            color: #c8a96e; padding: 10px; border-radius: 3px;
            font-size: 0.9rem; outline: none;
        }
        .field-full input:focus { border-color: #c8a96e; }
        .field-full input::placeholder { color: #2a3a5a; }
        .modal-section-label {
            font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
            color: #3a4a6a; margin-bottom: 10px; margin-top: 6px;
            border-top: 1px solid #1a2840; padding-top: 14px;
        }

        /* ── Modal ───────────────────────────────── */
        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.78);
            z-index: 600;
            align-items: center; justify-content: center;
        }
        .overlay.active { display: flex; }

        .modal {
            background: #0a1422;
            border: 1px solid #c8a96e;
            border-radius: 5px;
            padding: 32px;
            width: 90%; max-width: 400px;
            box-shadow: 0 0 60px rgba(200,169,110,0.15), 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal h3 {
            font-size: 0.68rem; letter-spacing: 3px;
            color: #5a5040; text-transform: uppercase; margin-bottom: 22px;
        }
        .modal-player { text-align: center; margin-bottom: 26px; }
        .modal-avatar-wrap {
            position: relative;
            width: 72px; height: 72px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, #c8a96e, #5a3a10, #c8a96e);
            margin: 0 auto 10px;
            cursor: pointer;
        }
        .modal-avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background: #0a1422;
        }
        .modal-avatar-overlay {
            position: absolute; inset: 2px;
            border-radius: 50%;
            background: rgba(0,0,0,0.65);
            display: flex; align-items: center; justify-content: center;
            color: #c8a96e; font-size: 0.6rem; letter-spacing: 1px;
            text-transform: uppercase; font-weight: 700;
            opacity: 0; transition: opacity 0.18s;
            pointer-events: none;
        }
        .modal-avatar-wrap:hover .modal-avatar-overlay { opacity: 1; }
        .modal-player .mname { color: #dfc080; font-size: 1.05rem; font-weight: 700; display: block; }
        .modal-player .msub  { color: #4a5a7a; font-size: 0.75rem; margin-top: 3px; display: block; }

        .modal-fields { display: flex; gap: 14px; margin-bottom: 26px; }
        .field { flex: 1; display: flex; flex-direction: column; gap: 7px; }
        .field label { font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase; color: #3a4a6a; }
        .field input {
            background: rgba(0,0,0,0.5);
            border: 1px solid #1a2840;
            color: #c8a96e;
            padding: 10px;
            border-radius: 3px;
            font-size: 1.1rem;
            text-align: center;
            outline: none; width: 100%;
        }
        .field input:focus { border-color: #c8a96e; }

        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-ghost {
            background: transparent;
            border: 1px solid #1a2840;
            color: #4a5a7a;
            padding: 9px 18px; border-radius: 3px;
            cursor: pointer; font-size: 0.72rem;
            letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.18s;
        }
        .btn-ghost:hover { border-color: #c8a96e; color: #c8a96e; }

        /* ── Mobile stats sub-text (hidden on desktop) ── */
        .mobile-stats { display: none; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
        .mobile-stat  { font-size: 0.65rem; color: #4a5a7a; }
        .mobile-stat b { color: #c8a96e; font-weight: 600; }

        @media (max-width: 660px) {
            /* Layout */
            .container { padding: 16px 12px 60px; }
            .header { margin-top: 48px; margin-bottom: 20px; }
            .admin-controls { top: 10px; right: 10px; gap: 6px; }
            .admin-badge { display: none !important; }
            .card { padding: 14px; }

            /* Add summoner form — stack vertically */
            .form-row { flex-direction: column; }
            .form-row input[type="text"] { width: 100%; min-width: unset; }
            .champ-picker, .picker-btn { width: 100%; }
            .form-row .btn { width: 100%; text-align: center; }

            /* Table — hide KDA & DMG columns, show them inline */
            .kda-col, .dmg-col { display: none !important; }
            .mobile-stats { display: flex; }
            td, th { padding: 9px 6px; }
            .wr-bar { width: 40px; }
            .rank-col { width: 28px; font-size: 0.95rem; }
            .avatar-wrap { width: 36px; height: 36px; }
            .name-cell { gap: 8px; }
            .player-name { font-size: 0.85rem; }
            .champ-sub { font-size: 0.62rem; }

            /* Make table scroll if admin cols push it wide */
            .card > div + table,
            .card table { display: block; overflow-x: auto; }

            /* Modals — near-fullscreen */
            .overlay { align-items: flex-end; padding-bottom: 0; }
            .modal {
                max-width: 100% !important;
                width: 100% !important;
                margin: 0 !important;
                border-radius: 12px 12px 0 0 !important;
                max-height: 92vh;
                overflow-y: auto;
            }
            .modal-fields { flex-direction: column; gap: 10px; }
            .modal-fields-3 { gap: 8px; }
            .field-full input { font-size: 0.85rem; }

            /* Log game rows */
            .lg-row { flex-wrap: wrap; row-gap: 6px; }
            .lg-name { min-width: 0; max-width: 120px; }
            .lg-controls { width: 100%; padding-left: 58px; flex-wrap: wrap; gap: 4px; }
            .lg-input { width: 38px; }
            .lg-input.wide { width: 58px; }
            .lg-players { max-height: 48vh; }

            /* Champion picker */
            .picker-dropdown { width: calc(100vw - 24px) !important; left: 12px !important; }
        }

        /* ── Admin ───────────────────────────────── */
        .admin-controls {
            position: fixed;
            top: 14px; right: 16px;
            z-index: 50;
            display: flex; align-items: center; gap: 10px;
        }

        .admin-badge {
            font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
            color: #c8a96e; background: rgba(200,169,110,0.1);
            border: 1px solid rgba(200,169,110,0.35);
            padding: 4px 10px; border-radius: 2px;
            display: none;
        }
        body.admin-mode .admin-badge { display: inline-block; }

        .btn-admin {
            background: transparent;
            border: 1px solid #1a2840;
            color: #4a5a7a;
            padding: 7px 14px; border-radius: 3px;
            cursor: pointer; font-size: 0.68rem;
            letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.18s;
        }
        .btn-admin:hover { border-color: #c8a96e; color: #c8a96e; }
        body.admin-mode .btn-admin { border-color: rgba(200,169,110,0.4); color: #7a6a4a; }
        body.admin-mode .btn-admin:hover { color: #e05050; border-color: #e05050; }

        /* Hide admin-only table columns when not admin */
        body:not(.admin-mode) .admin-col { display: none; }

        /* ── Log Game Modal ─────────────────────── */
        #log-modal .modal { max-width: 700px !important; width: 95vw; }

        .lg-players {
            max-height: 55vh; overflow-y: auto;
            margin: 0 -8px 20px; padding: 0 8px;
        }
        .lg-players::-webkit-scrollbar { width: 5px; }
        .lg-players::-webkit-scrollbar-thumb { background: #2a3a5a; border-radius: 3px; }

        .lg-row {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(26,40,64,0.5);
            transition: opacity 0.15s;
        }
        .lg-row:last-child { border-bottom: none; }
        .lg-row.dimmed { opacity: 0.3; }
        .lg-row.dimmed .lg-controls { pointer-events: none; }

        .lg-check {
            width: 16px; height: 16px; flex-shrink: 0;
            cursor: pointer; accent-color: #c8a96e;
        }

        .lg-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            padding: 2px; flex-shrink: 0;
            background: linear-gradient(135deg, #c8a96e, #5a3a10, #c8a96e);
        }
        .lg-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
        .lg-avatar.empty {
            border: 2px dashed #1a2840;
            padding: 0; display: flex; align-items: center;
            justify-content: center; color: #2a3a5a; font-size: 0.9rem;
            background: none;
        }

        .lg-name { flex: 1; min-width: 80px; font-weight: 600; color: #dfc080; font-size: 0.88rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .lg-controls { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

        .lg-wl {
            width: 28px; height: 28px; border-radius: 3px; border: none;
            cursor: pointer; font-weight: 800; font-size: 0.72rem; transition: all 0.15s;
        }
        .lg-wl.w          { background: rgba(38,95,52,0.25); color: #2a5a3a; border: 1px solid rgba(38,95,52,0.4); }
        .lg-wl.w.active   { background: rgba(38,95,52,0.9);  color: #50e070; }
        .lg-wl.l          { background: rgba(95,28,28,0.25); color: #5a2a2a; border: 1px solid rgba(95,28,28,0.4); }
        .lg-wl.l.active   { background: rgba(95,28,28,0.9);  color: #e05050; }

        .lg-sep { width: 1px; height: 20px; background: #1a2840; margin: 0 2px; }

        .lg-input {
            width: 46px; padding: 5px 3px; text-align: center;
            background: rgba(0,0,0,0.4); border: 1px solid #1a2840;
            color: #c8a96e; border-radius: 3px; font-size: 0.78rem; outline: none;
        }
        .lg-input:focus { border-color: #c8a96e; }
        .lg-input::placeholder { color: #2a3a5a; font-size: 0.65rem; }
        .lg-input.wide { width: 70px; }

        .lg-input-label {
            font-size: 0.55rem; color: #3a4a6a; text-align: center;
            letter-spacing: 1px; text-transform: uppercase; margin-top: 2px;
        }

        .lg-field { display: flex; flex-direction: column; }

        .lg-err {
            color: #e05050; font-size: 0.75rem; text-align: center;
            min-height: 18px; margin-bottom: 10px; letter-spacing: 1px;
        }


        /* ── Match History ───────────────────────── */
        .history-toggle {
            background: transparent; border: none; cursor: pointer;
            color: #2a3a5a; font-size: 0.78rem; padding: 2px 5px;

'use strict';

// ── Stars ────────────────────────────────────────────
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const STARS = Array.from({ length: 260 }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.6 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.5 + 0.15,
    gold: Math.random() < 0.12
}));
const shoots = [];
let lastT = 0;

function drawStars(t) {
    const dt = (t - lastT) / 1000;
    lastT = t;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of STARS) {
        s.phase += dt * s.speed;
        const a = 0.2 + 0.75 * ((Math.sin(s.phase) + 1) / 2);
        ctx.beginPath();
        ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.gold ? `rgba(220,190,120,${a})` : `rgba(170,185,225,${a})`;
        ctx.fill();
    }
    if (Math.random() < 0.004) {
        shoots.push({ x: Math.random() * 0.6, y: Math.random() * 0.4, vx: 0.004 + Math.random() * 0.003, vy: 0.002 + Math.random() * 0.002, life: 1 });
    }
    for (let i = shoots.length - 1; i >= 0; i--) {
        const sh = shoots[i];
        sh.x += sh.vx; sh.y += sh.vy; sh.life -= dt * 1.4;
        if (sh.life <= 0 || sh.x > 1.1) { shoots.splice(i, 1); continue; }
        const g = ctx.createLinearGradient(
            (sh.x - sh.vx * 28) * canvas.width, (sh.y - sh.vy * 28) * canvas.height,
            sh.x * canvas.width, sh.y * canvas.height
        );
        g.addColorStop(0, 'rgba(200,180,120,0)');
        g.addColorStop(1, `rgba(220,205,155,${sh.life * 0.75})`);
        ctx.beginPath();
        ctx.moveTo((sh.x - sh.vx * 28) * canvas.width, (sh.y - sh.vy * 28) * canvas.height);
        ctx.lineTo(sh.x * canvas.width, sh.y * canvas.height);
        ctx.strokeStyle = g; ctx.lineWidth = 1.4; ctx.stroke();
    }
    requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ── Picker state ──────────────────────────────────────
let selectedChamp = null; // { key, name } or null

function buildPickerGrid(filter = '') {
    const grid = document.getElementById('picker-grid');
    const q = filter.toLowerCase().trim();
    const visible = q ? CHAMPS.filter(c => c.name.toLowerCase().includes(q)) : CHAMPS;

    let html = '';
    const curChamp = currentPickerChamp();

    // "No champion" option
    if (!q) {
        const sel = !curChamp ? 'selected' : '';
        html += `<div class="no-champ-opt ${sel}" onclick="selectChamp(null)">
            <div class="no-icon">?</div>
            <span>None</span>
        </div>`;
    }

    for (const c of visible) {
        const sel = curChamp && curChamp.key === c.key ? 'selected' : '';
        html += `<div class="champ-option ${sel}" data-key="${c.key}" data-name="${esc(c.name)}" onclick="selectChampEl(this)">
            <img src="${imgUrl(c.key)}" alt="${esc(c.name)}" loading="lazy" />
            <span>${esc(c.name)}</span>
        </div>`;
    }

    if (q && visible.length === 0) {
        html = `<div style="color:#3a4a6a;font-size:0.78rem;padding:16px;text-align:center;grid-column:1/-1">No champions found</div>`;
    }

    grid.innerHTML = html;
}

function selectChampEl(el) {
    selectChamp({ key: el.dataset.key, name: el.dataset.name });
}

// 'add' = new player form, 'modal' = edit modal, {type:'loggame', playerId} = per-player log game
let pickerTarget = 'add';
let modalChamp = null;

// ── Match history state ───────────────────────────────
const lgChamps       = new Map(); // playerId → {key, name} for current logged game
const expandedPlayers = new Set(); // player IDs with history panel open
const historyCache   = new Map(); // playerId → games[]

function currentPickerChamp() {
    if (pickerTarget === 'modal') return modalChamp;
    if (pickerTarget?.type === 'loggame') return lgChamps.get(pickerTarget.playerId) || null;
    return selectedChamp;
}

function selectChamp(champ) {
    if (pickerTarget === 'modal') {
        modalChamp = champ;
        const avatarEl = document.getElementById('m-avatar');
        const subEl    = document.getElementById('m-champ');
        if (champ) {
            avatarEl.src = imgUrl(champ.key);
            subEl.textContent = champ.name;
        } else {
            avatarEl.src = '';
            subEl.textContent = 'No champion selected';
        }
    } else if (pickerTarget?.type === 'loggame') {
        const pid = pickerTarget.playerId;
        if (champ) lgChamps.set(pid, champ); else lgChamps.delete(pid);
        updateLgChampBtn(pid, champ);
    } else {
        selectedChamp = champ;
        const thumbWrap = document.getElementById('picker-thumb-wrap');
        const label = document.getElementById('picker-label');
        if (champ) {
            thumbWrap.outerHTML = `<img class="picker-thumb" id="picker-thumb-wrap" src="${imgUrl(champ.key)}" alt="${esc(champ.name)}" />`;
            label.textContent = champ.name;
        } else {
            const existing = document.getElementById('picker-thumb-wrap');
            if (existing.tagName === 'IMG') {
                existing.outerHTML = `<div class="picker-thumb placeholder" id="picker-thumb-wrap">?</div>`;
            }
            label.textContent = 'Pick Champion';
        }
    }
    buildPickerGrid(document.getElementById('picker-search').value);
    closePicker();
}

function openPickerAt(anchorEl) {
    const dd = document.getElementById('picker-dropdown');
    const rect = anchorEl.getBoundingClientRect();
    const dropW = Math.min(340, window.innerWidth - 20);
    let left = rect.left + rect.width / 2 - dropW / 2;
    if (left + dropW > window.innerWidth - 10) left = window.innerWidth - dropW - 10;
    dd.style.top  = (rect.bottom + 6) + 'px';
    dd.style.left = Math.max(10, left) + 'px';
    dd.style.width = dropW + 'px';
    dd.classList.add('open');
    document.getElementById('picker-search').value = '';
    buildPickerGrid();
    document.getElementById('picker-search').focus();
}

function togglePicker() {
    const dd = document.getElementById('picker-dropdown');
    const btn = document.getElementById('picker-btn');
    if (dd.classList.contains('open') && pickerTarget === 'add') { closePicker(); return; }
    pickerTarget = 'add';
    btn.classList.add('open');
    openPickerAt(btn);
}

function openModalPicker() {
    pickerTarget = 'modal';
    document.getElementById('picker-btn').classList.remove('open');
    openPickerAt(document.querySelector('.modal-avatar-wrap'));
}

function openLgChampPicker(playerId, anchorEl) {
    pickerTarget = { type: 'loggame', playerId };
    document.getElementById('picker-btn').classList.remove('open');
    openPickerAt(anchorEl);
}

function updateLgChampBtn(pid, champ) {
    const btn = document.getElementById(`lg-champ-btn-${pid}`);
    if (!btn) return;
    if (champ) {
        btn.innerHTML = `<div class="lg-avatar"><img src="${imgUrl(champ.key)}" alt="${esc(champ.name)}" /></div>`;

// ── Render ────────────────────────────────────────────
function wr(w, l) { return w+l===0 ? 0 : Math.round(w/(w+l)*100); }
function wrColor(r) { return r>=60?'#50e070':r>=50?'#c8a96e':'#e05050'; }

function kdaRatio(k, d, a) {
    if (k+d+a === 0) return null;
    return ((k + a) / Math.max(1, d)).toFixed(2);
}
function kdaColor(r) {
    if (r === null) return '#3a4a6a';
    if (r >= 4) return '#50e070';
    if (r >= 2.5) return '#c8a96e';
    return '#e05050';
}
function avgDmg(dmg, games) {
    if (!dmg || !games) return null;
    return Math.round(dmg / games).toLocaleString();
}

const MEDALS = ['🥇','🥈','🥉'];

function render() {
    const sorted = [...players].sort((a, b) => {
        const ra = wr(a.wins,a.losses), rb = wr(b.wins,b.losses);
        if (rb!==ra) return rb-ra;
        if (b.wins!==a.wins) return b.wins-a.wins;
        return a.losses-b.losses;
    });

    const tbody = document.getElementById('standings-body');
    if (!sorted.length) {
        tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">No summoners yet — add one above!</div></td></tr>`;
        return;
    }

    const sortedPlayers = sorted; // keep ref for post-render
    // Will restore expanded history rows after innerHTML is set
    const toRestore = sortedPlayers.filter(p => expandedPlayers.has(p.id));

    tbody.innerHTML = sortedPlayers.map((p, i) => {
        const rank  = i + 1;
        const rate  = wr(p.wins, p.losses);
        const color = wrColor(rate);
        const medal = MEDALS[i] ?? rank;
        const hasImg = !!p.champKey;
        const avatar = hasImg
            ? `<div class="avatar-wrap"><img src="${imgUrl(p.champKey)}" alt="${esc(p.champName)}" /></div>`
            : `<div class="avatar-wrap" style="width:46px;height:46px;border-radius:50%;border:2px dashed #1a2840;display:flex;align-items:center;justify-content:center;color:#2a3a5a;font-size:1.2rem">?</div>`;

        const games   = p.wins + p.losses;
        const kda     = kdaRatio(p.kills, p.deaths, p.assists);
        const kdaClr  = kdaColor(kda);
        const dmg     = avgDmg(p.damage, games);

        const kdaCell = kda !== null
            ? `<div class="kda-val" style="color:${kdaClr}">${kda}</div>
               <div class="stat-sub">${p.kills}/${p.deaths}/${p.assists}</div>`
            : `<span style="color:#3a4a6a">—</span>`;

        const dmgCell = dmg !== null
            ? `<div class="dmg-val">${dmg}</div>`
            : `<span style="color:#3a4a6a">—</span>`;

        // Shown on mobile instead of hidden columns
        const mobileStats = (kda !== null || dmg !== null) ? `
            <div class="mobile-stats">
                ${kda !== null ? `<span class="mobile-stat">KDA: <b style="color:${kdaClr}">${kda}</b></span>` : ''}
                ${dmg !== null ? `<span class="mobile-stat">DMG: <b>${dmg}</b></span>` : ''}
            </div>` : '';

        const isExpanded = expandedPlayers.has(p.id);
        return `<tr id="player-row-${p.id}">
            <td class="rank-col">${medal}</td>
            <td>
                <div class="name-cell">
                    ${avatar}
                    <div style="flex:1;min-width:0">
                        <div style="display:flex;align-items:center;gap:4px">
                            <div class="player-name">${esc(p.name)}</div>
                            <button class="history-toggle" onclick="toggleHistory(${p.id})" title="Match history">${isExpanded ? '▴' : '▾'}</button>
                        </div>
                        <div class="champ-sub">${p.champName ? esc(p.champName) : ''}</div>
                        ${mobileStats}
                    </div>
                </div>
            </td>
            <td class="center wins">${p.wins}</td>
            <td class="center losses">${p.losses}</td>
            <td class="center">
                <div class="wr-val" style="color:${color}">${games===0?'—':rate+'%'}</div>
                <div class="wr-bar"><div class="wr-fill" style="width:${rate}%;background:${color}"></div></div>
            </td>
            <td class="center kda-col">${kdaCell}</td>
            <td class="center dmg-col">${dmgCell}</td>
            <td class="center admin-col">
                <div class="row-actions">
                    <button class="qbtn w" onclick="addWin(${p.id})" title="Add Win">W</button>
                    <button class="qbtn l" onclick="addLoss(${p.id})" title="Add Loss">L</button>
                </div>
            </td>
            <td class="center admin-col">
                <div class="row-actions">
                    <button class="btn btn-gold btn-sm" onclick="openModal(${p.id})">Edit</button>
                    <button class="del-btn" onclick="remove(${p.id})">✕</button>
                </div>
            </td>
        </tr>`;
    }).join('');

    // Re-insert history panels for players that were expanded before re-render
    for (const p of toRestore) {
        const cached = historyCache.get(p.id);
        if (cached) insertHistoryRow(p.id, cached);
        else fetchAndShowHistory(p.id);
    }
}

async function submitGame() {
    const errEl = document.getElementById('lg-err');
    errEl.textContent = '';

    const updates  = [];
    const histRows = [];
    for (const p of players) {
        const checkbox = document.getElementById(`lg-check-${p.id}`);
        if (!checkbox?.checked) continue;

        const wActive = document.getElementById(`lg-w-${p.id}`).classList.contains('active');
        const lActive = document.getElementById(`lg-l-${p.id}`).classList.contains('active');
        if (!wActive && !lActive) {
            errEl.textContent = `Select W or L for ${p.name}.`;
            return;
        }

        const k   = Math.max(0, parseInt(document.getElementById(`lg-k-${p.id}`).value)   || 0);
        const d   = Math.max(0, parseInt(document.getElementById(`lg-d-${p.id}`).value)   || 0);
        const a   = Math.max(0, parseInt(document.getElementById(`lg-a-${p.id}`).value)   || 0);
        const dmg = Math.max(0, parseInt(document.getElementById(`lg-dmg-${p.id}`).value) || 0);
        const lgC = lgChamps.get(p.id) || null;

        updates.push(
            db.from('players').update({
                wins:    p.wins    + (wActive ? 1 : 0),
                losses:  p.losses  + (lActive ? 1 : 0),
                kills:   p.kills   + k,
                deaths:  p.deaths  + d,
                assists: p.assists + a,
                damage:  p.damage  + dmg,
            }).eq('id', p.id)
        );

        histRows.push({
            player_id:  p.id,
            result:     wActive ? 'W' : 'L',
            kills:      k, deaths: d, assists: a, damage: dmg,
            champ_key:  lgC?.key  || null,
            champ_name: lgC?.name || null,
        });
    }

    if (!updates.length) { errEl.textContent = 'Check at least one player.'; return; }

    const results = await Promise.all(updates);
    const failed  = results.find(r => r.error);
    if (failed) { console.error(failed.error); errEl.textContent = 'Save failed. Check console.'; return; }

    if (histRows.length) {
        const { error: hErr } = await db.from('match_history').insert(histRows);
        if (hErr) console.error('History insert error:', hErr.message);
        histRows.forEach(r => historyCache.delete(r.player_id));
    }

    closeLogGame();
}

// ── Match History ─────────────────────────────────────
function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function toggleHistory(id) {
    const playerRow = document.getElementById(`player-row-${id}`);
    if (!playerRow) return;

    if (expandedPlayers.has(id)) {
        // Collapse
        expandedPlayers.delete(id);
        const histRow = document.getElementById(`history-row-${id}`);
        if (histRow) histRow.remove();
        const toggle = playerRow.querySelector('.history-toggle');
        if (toggle) toggle.textContent = '▾';
    } else {
        // Expand
        expandedPlayers.add(id);
        const toggle = playerRow.querySelector('.history-toggle');
        if (toggle) toggle.textContent = '▴';
        const cached = historyCache.get(id);
        if (cached) insertHistoryRow(id, cached);
        else fetchAndShowHistory(id);
    }
}

async function fetchAndShowHistory(id) {
    // Show loading placeholder
    const playerRow = document.getElementById(`player-row-${id}`);
    if (!playerRow) return;
    let histRow = document.getElementById(`history-row-${id}`);
    if (!histRow) {
        histRow = document.createElement('tr');
        histRow.id = `history-row-${id}`;
        histRow.className = 'history-row';
        histRow.innerHTML = `<td colspan="9"><div class="history-panel"><span class="history-loading">Loading…</span></div></td>`;
        playerRow.insertAdjacentElement('afterend', histRow);
    }

    const { data, error } = await db
        .from('match_history')
        .select('*')
        .eq('player_id', id)
        .order('played_at', { ascending: false })
        .limit(5);

    if (!expandedPlayers.has(id)) return; // closed while loading

    if (error) {
        console.error('History fetch error:', error.message);
        histRow.innerHTML = `<td colspan="9"><div class="history-panel"><span class="history-empty">Could not load history.</span></div></td>`;
        return;
    }

    historyCache.set(id, data || []);
    insertHistoryRow(id, data || []);
}

function insertHistoryRow(pid, games) {
    const playerRow = document.getElementById(`player-row-${pid}`);
    if (!playerRow) return;

    // Remove existing history row if present
    const existing = document.getElementById(`history-row-${pid}`);
    if (existing) existing.remove();

    const histRow = document.createElement('tr');
    histRow.id = `history-row-${pid}`;
    histRow.className = 'history-row';

    if (!games.length) {
        histRow.innerHTML = `<td colspan="9"><div class="history-panel"><span class="history-empty">No games logged yet.</span></div></td>`;
    } else {
        const cards = games.map(g => {
            const isWin = g.result === 'W';
            const champImg = g.champ_key
                ? `<img class="game-champ" src="${imgUrl(g.champ_key)}" alt="${esc(g.champ_name || '')}" />`
                : `<div class="game-champ-empty">?</div>`;
            const kda = g.kills !== null ? `${g.kills}/${g.deaths}/${g.assists}` : '';
            const dmg = g.damage ? Math.round(g.damage).toLocaleString() : '';
            return `<div class="game-card ${isWin ? 'win' : 'loss'}">
                ${champImg}
                <div class="game-badge ${isWin ? 'win' : 'loss'}">${g.result}</div>
                ${kda ? `<div class="game-kda">${kda}</div>` : ''}
                ${dmg ? `<div class="game-dmg">${dmg}</div>` : ''}
                <div class="game-date">${fmtDate(g.played_at)}</div>
            </div>`;
        }).join('');
        histRow.innerHTML = `<td colspan="9"><div class="history-panel">${cards}</div></td>`;
    }

    playerRow.insertAdjacentElement('afterend', histRow);
}

async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

}

async function adminSubmit() {
    const pass    = document.getElementById('admin-pass').value;
    const confirm = document.getElementById('admin-confirm').value;
    const errEl   = document.getElementById('admin-err');
    errEl.textContent = '';

    if (!pass) { errEl.textContent = 'Enter a password.'; return; }

    if (!hasAdminSetup()) {
        // First-time claim
        if (pass !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }
        if (pass.length < 4)  { errEl.textContent = 'Password must be at least 4 characters.'; return; }
        const hash = await sha256(pass);
        localStorage.setItem(HASH_KEY, hash);
        sessionStorage.setItem(SESSION_KEY, '1');
        applyAdminMode();
        closeAdminModal();
    } else {
        // Login
        const hash   = await sha256(pass);
        const stored = localStorage.getItem(HASH_KEY);
        if (hash === stored) {
            sessionStorage.setItem(SESSION_KEY, '1');
            applyAdminMode();
            closeAdminModal();
        } else {
            errEl.textContent = 'Incorrect password.';
            document.getElementById('admin-pass').value = '';
            document.getElementById('admin-pass').focus();
        }
    }
}

function adminLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    applyAdminMode();
    closeAdminModal();
}

function adminChangePassword() {
    localStorage.removeItem(HASH_KEY);
    sessionStorage.removeItem(SESSION_KEY);
    applyAdminMode();
    openAdminModal(); // re-opens in "set password" mode
}

// Enter key in admin modal
document.getElementById('admin-pass').addEventListener('keydown',    e => { if(e.key==='Enter') adminSubmit(); });
document.getElementById('admin-confirm').addEventListener('keydown', e => { if(e.key==='Enter') adminSubmit(); });
document.getElementById('admin-modal').addEventListener('click', function(e) { if(e.target===this) closeAdminModal(); });

// Init admin state on load
applyAdminMode();
</script>
</body>
